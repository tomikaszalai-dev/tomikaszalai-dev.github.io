const wrap = document.getElementById('wrap');
const tooltip = document.getElementById('tooltip');
const toggle = document.getElementById('toggleHighlight');

hotspots.forEach(h => {
  const el = document.createElement('div');
  el.className = 'hotspot' + (h.url ? '' : ' disabled');
  el.style.left = h.xPct + '%';
  el.style.top = h.yPct + '%';
  el.style.width = (h.rPct * 2) + '%';
  el.style.height = (h.rPct * 2) + '%';
  el.tabIndex = 0;
  el.setAttribute('role', 'link');
  el.setAttribute('aria-label', h.name);

  el.addEventListener('mouseenter', (e) => {
    tooltip.textContent = h.name + (h.url ? '' : ' (nincs még megadott link)');
    tooltip.style.display = 'block';
  });
  el.addEventListener('mousemove', (e) => {
    tooltip.style.left = (e.clientX + 14) + 'px';
    tooltip.style.top = (e.clientY + 10) + 'px';
  });
  el.addEventListener('mouseleave', () => {
    tooltip.style.display = 'none';
  });
  el.addEventListener('click', () => {
    if (h.url) {
      window.open(h.url, '_blank', 'noopener');
    }
  });
  el.addEventListener('keypress', (e) => {
    if ((e.key === 'Enter' || e.key === ' ') && h.url) {
      window.open(h.url, '_blank', 'noopener');
    }
  });

  wrap.appendChild(el);
});

toggle.addEventListener('change', () => {
  document.querySelectorAll('.hotspot').forEach(el => {
    if (toggle.checked) {
      el.style.background = '';
      el.style.borderColor = '';
    } else {
      el.style.background = 'transparent';
      el.style.borderColor = 'transparent';
    }
  });
});
